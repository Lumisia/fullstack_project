apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Rewrite any baked-in public API domain to the k8s-internal API path
        sub_filter_once off;
        sub_filter_types text/html text/javascript application/javascript application/json;
        sub_filter 'https://api.fileinnout.kro.kr' '/api';
        sub_filter 'http://api.fileinnout.kro.kr' '/api';
      }

      location /api {
        proxy_pass http://backend-service:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
