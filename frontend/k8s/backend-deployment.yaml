apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-infra
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          for port in 3306 6379 9000; do
            until nc -z infra-service "$port"; do
              echo "waiting for infra-service:${port}"
              sleep 2
            done
          done
      containers:
      - name: backend
        image: lumisia/waffle-app:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
