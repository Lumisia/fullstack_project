apiVersion: apps/v1
kind: Deployment
metadata:
  name: waffle-infra-deployment
  labels:
    app: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra
  strategy:
    type: Recreate # 데이터 일관성을 위해 기존 Pod 삭제 후 생성
  template:
    metadata:
      labels:
        app: infra
    spec:
      containers:
      # --- 1. MariaDB 컨테이너 ---
      - name: mariadb
        image: mariadb:11.4
        imagePullPolicy: Always
        env:
        - name: MARIADB_DATABASE
          value: "web"
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_PASS # backend-config에 해당 키가 있어야 합니다.
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -h 127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"

      # --- 2. Redis 컨테이너 ---
      - name: redis
        image: redis:7.4
        imagePullPolicy: Always
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

      # --- 3. MinIO 컨테이너 ---
      - name: minio
        image: minio/minio:latest
        imagePullPolicy: Always
        command:
        - minio
        - server
        - /data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: MINIO_NAME # backend-config에 있는 키 이름 확인 필요
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: MINIO_SECRET
        ports:
        - containerPort: 9000
        - containerPort: 9001
        volumeMounts:
        - name: minio-data
          mountPath: /data
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

      volumes:
      - name: mariadb-data
        persistentVolumeClaim:
          claimName: mariadb-pvc
      - name: minio-data
        persistentVolumeClaim:
          claimName: minio-pvc

---
# 4. 통합 인프라 서비스 (내부 포트 노출)
apiVersion: v1
kind: Service
metadata:
  name: infra-service
spec:
  selector:
    app: infra
  ports:
  - name: db
    port: 3306
    targetPort: 3306
  - name: redis
    port: 6379
    targetPort: 6379
  - name: minio-api
    port: 9000
    targetPort: 9000
  - name: minio-console
    port: 9001
    targetPort: 9001
