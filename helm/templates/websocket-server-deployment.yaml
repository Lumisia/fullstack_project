apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wafflebear.fullname" . }}-websocket
  labels:
    app.kubernetes.io/name: websocket
    app.kubernetes.io/part-of: wafflebear
spec:
  replicas: {{ .Values.websocket.replicaCount }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/part-of: wafflebear
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      annotations:
        checksum/websocket-env: {{ include (print $.Template.BasePath "/websocket-server-configmap.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: websocket
        app.kubernetes.io/part-of: wafflebear
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: websocket-server
          image: "{{ .Values.websocket.image.repository }}:{{ .Values.websocket.image.tag }}"
          imagePullPolicy: {{ .Values.websocket.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "wafflebear.fullname" . }}-websocket-env
          ports:
            - containerPort: {{ .Values.websocket.service.port }}
              name: ws
          startupProbe:
            tcpSocket:
              port: {{ .Values.websocket.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: {{ .Values.websocket.service.port }}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.websocket.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 20
          resources:
{{ toYaml .Values.websocket.resources | indent 12 }}
