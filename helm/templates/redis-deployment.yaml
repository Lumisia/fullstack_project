apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.service.name }}
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wafflebear
spec:
  serviceName: {{ .Values.redis.service.name }}
  replicas: {{ .Values.redis.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: wafflebear
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: wafflebear
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          args:
            - --port
            - "{{ .Values.redis.service.port }}"
            - --bind
            - "0.0.0.0"
            - --protected-mode
            - "no"
            - --appendonly
            - "{{ .Values.redis.config.appendonly }}"
            - --save
            - "{{ .Values.redis.config.saveSeconds }}"
            - "{{ .Values.redis.config.saveChanges }}"
            - --dir
            - /data
            - --maxmemory
            - "{{ .Values.redis.config.maxmemory }}"
            - --maxmemory-policy
            - "{{ .Values.redis.config.maxmemoryPolicy }}"
          ports:
            - containerPort: {{ .Values.redis.service.port }}
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p {{ .Values.redis.service.port }} ping
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p {{ .Values.redis.service.port }} ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p {{ .Values.redis.service.port }} ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - redis-cli -p {{ .Values.redis.service.port }} shutdown save || true
          resources:
{{ toYaml .Values.redis.resources | indent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.redis.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
