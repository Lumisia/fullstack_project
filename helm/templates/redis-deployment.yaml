apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.service.name }}
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: wafflebear
spec:
  serviceName: {{ .Values.redis.service.name }}
  replicas: {{ .Values.redis.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: wafflebear
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: wafflebear
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - /bin/sh
            - /etc/redis/scripts/redis-entrypoint.sh
          env:
            - name: REDIS_PORT
              value: "{{ .Values.redis.service.port }}"
            - name: REDIS_DATA_DIR
              value: /data
            - name: REDIS_HEADLESS_SERVICE
              value: "{{ .Values.redis.service.name }}"
            - name: REDIS_MAXMEMORY
              value: "{{ .Values.redis.config.maxmemory }}"
            - name: REDIS_MAXMEMORY_POLICY
              value: "{{ .Values.redis.config.maxmemoryPolicy }}"
            - name: REDIS_SENTINEL_MASTER
              value: "{{ .Values.redis.sentinel.masterName }}"
            - name: REDIS_SENTINEL_NODES
              value: "{{ .Values.redis.sentinel.name }}:{{ .Values.redis.sentinel.port }}"
            - name: REDIS_FALLBACK_MASTER
              value: "{{ .Values.redis.sentinel.masterHost }}"
          ports:
            - containerPort: {{ .Values.redis.service.port }}
              name: redis
          volumeMounts:
            - name: redis-scripts
              mountPath: /etc/redis/scripts
            - name: redis-data
              mountPath: /data
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p ${REDIS_PORT:-6379} ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p ${REDIS_PORT:-6379} ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - redis-cli -p ${REDIS_PORT:-6379} ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - redis-cli -p ${REDIS_PORT:-6379} shutdown save || true
          resources:
{{ toYaml .Values.redis.resources | indent 12 }}
      volumes:
        - name: redis-scripts
          configMap:
            name: {{ include "wafflebear.fullname" . }}-redis-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.redis.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
